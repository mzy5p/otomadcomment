<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音MAD代理コメントサイト お問い合わせ</title>

<style>
    body{
        margin:0;
        font-family:"Yu Gothic",sans-serif;
        background:linear-gradient(135deg,#1f1f1f,#2f2f2f);
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
    }

    .box{
        width:90%;
        max-width:600px;
        background:#3b3b3b;
        padding:40px;
        border-radius:20px;
        text-align:center;
        box-shadow:0 0 25px rgba(0,0,0,0.5);
    }

    h1{
        color:#00cfff;
        margin-top:0;
        font-size:32px;
    }

    p{
        line-height:1.8;
        font-size:18px;
    }

    .contact-link{
        display:inline-block;
        margin-top:25px;
        padding:15px 30px;
        background:#00bfff;
        color:white;
        text-decoration:none;
        border-radius:12px;
        font-size:20px;
        transition:0.2s;
    }

    .contact-link:hover{
        background:#009fd6;
        transform:scale(1.03);
    }

    footer{
        margin-top:30px;
        opacity:0.7;
        font-size:14px;
    }
</style>
</head>

<body>

<div class="box">
    <h1>音MAD代理コメントサイト</h1>

    <p>
        このサイトでは無断転載、その他に関するお問い合わせをできます。<br>
        是非お願いします。
    </p>

    <p>
        お問い合わせしたい場合はこちらからどうぞ。
    </p>

    <a class="contact-link"
       href="mailto:mitxzy@outlook.com?subject=お問い合わせしたい内容を書いてください。">
       お問い合わせはこちら
    </a>

    <footer>
        © 音MAD代理コメントサイト
    </footer>
</div>

</body>
</html>
